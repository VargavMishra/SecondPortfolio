<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @font-face {
            font-family: font1;
            src: url(../assests/fonts/cinzel.bold.ttf);
        }

        .skills-bar-container {
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: black;
            background: <iframe src='https://my.spline.design/matrixtext-YWlqcNn8jgN7TfHTQOFZ0OFw/' frameborder='0' width='100%' height='100%' ></iframe>
        }



        .bar-skill {
            position: relative;
            display: flex;
            /* Arranges cards side-by-side */
            justify-content: space-between;
            gap: 20px;
            padding: 50px 20px;
            /* Add padding so SVG has room */
            overflow: hidden;
            /* Keeps SVG from spilling out */
            /* border: 2px solid yellow; */
            width: 100%;
        }

        .bar-skill svg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            /* Centers the SVG perfectly */
            width: 80%;
            /* Adjust size of the "SKILLS" text */
            height: auto;
            z-index: 9999;
            /* Puts it behind */
            opacity: 0.2;
            /* Optional: Makes it a subtle watermark */
            pointer-events: none;
            /* Clicks pass through to the cards */
        }

        .barcard1 {
            /* glass style */
            backdrop-filter: blur(3px) saturate(155%);
            -webkit-backdrop-filter: blur(3px) saturate(155%);
            background-color: rgba(71, 0, 71, 0.41);
            border-radius: 12px;
            /* border: 1px solid rgba(255, 255, 255, 0.125); */
            border: 2px solid wheat;
            /* ======= */
            padding: 0.6rem 1.8rem 2rem 1.8rem;

        }

        .barcard2 {
            /* glass style */
            backdrop-filter: blur(3px) saturate(155%);
            -webkit-backdrop-filter: blur(3px) saturate(155%);
            background-color: rgba(71, 0, 71, 0.41);
            border-radius: 12px;
            /* border: 1px solid rgba(255, 255, 255, 0.125); */
            border: 2px solid wheat;
            /* ======= */
            padding: 0.6rem 1.8rem 2rem 1.8rem;

        }

        .skills-bar-container h2 {
            font-weight: 400;
            letter-spacing: 1px;
            margin-top: 40px;
            margin-bottom: 5px;
            color: wheat;
            font-size: 16px;
        }

        .pgbar {
            background: gray;
            width: 600px;
            height: 10px;
            border-radius: 5px;
        }

        .pgbar div {
            height: 10px;
            border-radius: 5px;
            width: 0%;
        }

        .pgbar div span {
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: black;
            float: right;
            margin-top: -5px;
            margin-right: -5px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* custom bars */
        .htmlbar {
            background: #CD7F32;
            animation: html-ani 1s linear forwards;
        }

        .cssbar {
            background: #2965f1;
            animation: css-ani 1s linear forwards;
        }

        .jsbar {
            background: #f0db4f;
            animation: js-ani 1s linear forwards;
        }

        .javabar {
            background: green;
            animation: java-ani 1s linear forwards;
        }

        .sqlbar {
            background: #00758F;
            animation: sql-ani 1s linear forwards;
        }

        .bootstrapbar {
            background: #7c3fd7;
            animation: bts-ani 1s linear forwards;
        }

        .pythonbar {
            background: #FFD43B;
            animation: py-ani 1s linear forwards;
        }

        .springbootbar {
            background: #9ACE5E;
            animation: spring-ani 1s linear forwards;
        }

        .seobar {
            background: rgb(0, 255, 170);
            animation: seo-ani 1s linear forwards;
        }

        .aibar {
            background: whitesmoke;
            animation: ai-ani 1s linear forwards;
        }




        /* spans border */
        .htmlbar span {
            border: 1px solid #CD7F32;
            ;
        }

        .cssbar span {
            border: 1px solid #2965f1;
        }

        .jsbar span {
            border: 1px solid #f0db4f;
        }

        .javabar span {
            border: 1px solid green;
        }

        .sqlbar span {
            border: 1px solid #00758F;
        }

        .bootstrapbar span {
            border: 1px solid #7c3fd7;
        }

        .pythonbar span {
            border: 1px solid #FFD43B;
        }

        .springbootbar span {
            border: 1px solid #9ACE5E;
        }

        .seobar span {
            border: 1px solid rgb(0, 255, 170);
        }

        .aibar span {
            border: 1px solid whitesmoke;
        }


        /* card animations */
        

        /* bar animations */
        @keyframes html-ani {
            100% {
                width: 100%;
            }
        }

        @keyframes css-ani {
            100% {
                width: 90%;
            }
        }

        @keyframes js-ani {
            100% {
                width: 50%;
            }
        }

        @keyframes java-ani {
            100% {
                width: 80%;
            }
        }

        @keyframes sql-ani {
            100% {
                width: 100%;
            }
        }

        @keyframes bts-ani {
            100% {
                width: 90%;
            }
        }

        @keyframes py-ani {
            100% {
                width: 50%;
            }
        }

        @keyframes spring-ani {
            100% {
                width: 10%;
            }
        }

        @keyframes seo-ani {
            100% {
                width: 40%;
            }
        }

        @keyframes ai-ani {
            100% {
                width: 70%;
            }
        }
    </style>
</head>

<body>
    <!-- skills bar type menu -->
    <section>
        <div class="skills-bar-container">
            <div class="bar-skill">

                <svg xmlns="http://www.w3.org/2000/svg" width="300" height="60" viewBox="0 0 300 60">
                    <defs>
                        <linearGradient id="skills_gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" stop-color="#ffffff" />
                            <stop offset="100%" stop-color="#ffffff" />
                        </linearGradient>

                        <filter id="whiteShadow" x="-50%" y="-50%" width="200%" height="200%">
                            <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="white" flood-opacity="2" />
                        </filter>
                    </defs>

                    <text x="50%" y="38" text-anchor="middle" font-family="Poppins" font-weight="500" font-size="32"
                        letter-spacing="0.5" fill="url(#skills_gradient)" filter="url(#whiteShadow)">
                        SKILLS
                    </text>
                </svg>

                <!-- card 1 -->
                <div class="barcard1 animate__animated animate__fadeInLeft">
                    <!-- skill 1 -->
                    <h2>HTML</h2>
                    <div class="pgbar">
                        <div class="htmlbar"><span></span></div>
                    </div>
                    <!-- skill 2 -->
                    <h2>CSS</h2>
                    <div class="pgbar">
                        <div class="cssbar"><span></span></div>
                    </div>
                    <!-- skill 3 -->
                    <h2>JavaScript</h2>
                    <div class="pgbar">
                        <div class="jsbar"><span></span></div>
                    </div>
                    <!-- skill 4 -->
                    <h2>Java</h2>
                    <div class="pgbar">
                        <div class="javabar"><span></span></div>
                    </div>
                    <!-- skill 5 -->
                    <h2>SQL</h2>
                    <div class="pgbar">
                        <div class="sqlbar"><span></span></div>
                    </div>
                </div>


                <!-- card 2 -->
                <div class="barcard2 animate__animated animate__fadeInRight">
                    <!-- skill 6 -->
                    <h2>BootStrap</h2>
                    <div class="pgbar">
                        <div class="bootstrapbar"><span></span></div>
                    </div>
                    <!-- skill 7 -->
                    <h2>Python</h2>
                    <div class="pgbar">
                        <div class="pythonbar"><span></span></div>
                    </div>
                    <!-- skill 8 -->
                    <h2>SpringBoot</h2>
                    <div class="pgbar">
                        <div class="springbootbar"><span></span></div>
                    </div>
                    <!-- skill 9 -->
                    <h2>SEO</h2>
                    <div class="pgbar">
                        <div class="seobar"><span></span></div>
                    </div>
                    <!-- Skills 10 -->
                    <h2>AI Tech</h2>
                    <div class="pgbar">
                        <div class="aibar"><span></span></div>
                    </div>
                </div>

            </div>

        </div>
    </section>



</body>

</html>
